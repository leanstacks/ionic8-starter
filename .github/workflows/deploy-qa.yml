name: Deploy to QA

on:
  push:
    branches:
      - release/*
    tags:
      - qa

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to QA
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      aws_region: ${{ vars.AWS_REGION }}
      aws_role_arn: ${{ vars.AWS_ROLE_ARN_QA }}
      env_code: qa
      env_file: ${{ vars.ENV_QA }}
      cdk_env_file: ${{ vars.CDK_ENV_QA }}
