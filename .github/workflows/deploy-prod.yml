name: Deploy to PROD

on:
  release:
    types:
      - published
  push:
    tags:
      - prod

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to PROD
    uses: ./.github/workflows/deploy-reusable.yml
    permissions:
      id-token: write
      contents: read
    with:
      aws_region: ${{ vars.AWS_REGION }}
      aws_role_arn: ${{ vars.AWS_ROLE_ARN_PROD }}
      env_code: prod
      env_file: ${{ vars.ENV_PROD }}
      cdk_env_file: ${{ vars.CDK_ENV_PROD }}
